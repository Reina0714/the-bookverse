<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Bookverse | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="catalog.html">Catalog</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        
        <p><strong>Address:</strong> No. 42 Nebula Street, The Quiet District, 50450 Kuala Lumpur</p>
        <p><strong>Phone:</strong> +60 12-345 6789</p>
        <p><strong>Email:</strong> universeofbook@bookverse.com</p>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd;">

        <h2>We'd Love to Hear From You!</h2>
        
        <form class="contact-form" action="#" method="POST">
            
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]+" minlength="9" required placeholder="Numbers only">
            </div>

            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </main>
</body>
</html>
